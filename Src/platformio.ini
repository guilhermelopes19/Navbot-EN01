; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@~4.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	bitbank2/BitBang_I2C@^2.2.1
	smfsw/Queue@^2.1
